## F-Stack over vhost-user, side A: eth_vhost backend (no physical NIC).
## Creates /tmp/fstack-vhost0.sock and serves the virtio rings; start this
## instance first, then the virtio_user frontend (config-vhost-b.ini).
[dpdk]
# core 1; side B uses core 2 — two DPDK primaries on one host
lcore_mask=2
channel=4
promiscuous=1
numa_on=1

# virtio offloads on: TX checksum + TSO/GSO. tso=1 makes the eth_vhost
# backend offer VIRTIO_NET_F_HOST_TSO4 so the frontend pushes ~64KB GSO
# super-segments through the ring (one stack trip per ~34KB, not per 1448B).
# RX checksums are trusted (ff-vhost-rx-csum-trust.patch) — no full csum is
# computed end to end on this shared-memory link.
tx_csum_offoad_skip=0
tso=1
vlan_strip=0

idle_sleep=0
# send immediately; TX batching delay quantizes the ACK clock on
# low-latency links (see nix/README.md)
pkt_tx_delay=0
symmetric_rss=0

port_list=0

# distinct --file-prefix per primary (becomes "container-vhosta")
file_prefix=vhosta

nb_vdev=1
nb_bond=0

# vdev0 = DPDK port 0: vhost-user backend
[vdev0]
iface=/tmp/fstack-vhost0.sock
queues=1

[pcap]
enable=0
snaplen=96
savelen=16777216
savepath=/tmp/ffpcap
timestamp_precision=0

[port0]
lcore_list=1
addr=192.168.31.1
netmask=255.255.255.0
broadcast=192.168.31.255
gateway=192.168.31.2

[freebsd.boot]
hz=100
fd_reserve=128
kern.ipc.maxsockets=262144
net.inet.tcp.syncache.hashsize=4096
net.inet.tcp.syncache.bucketlimit=100
net.inet.tcp.tcbhashsize=65536
kern.ncallout=262144
kern.features.inet6=1

[freebsd.sysctl]
kern.ipc.somaxconn=32768
kern.ipc.maxsockbuf=16777216
net.add_addr_allfibs=1
net.link.ether.inet.maxhold=5
net.inet.tcp.fast_finwait2_recycle=1
net.inet.tcp.finwait2_timeout=5000
net.inet.tcp.maxtcptw=128
net.inet.tcp.sendspace=16384
net.inet.tcp.recvspace=8192
net.inet.tcp.cc.algorithm=cubic
net.inet.tcp.sendbuf_max=16777216
net.inet.tcp.recvbuf_max=16777216
net.inet.tcp.sendbuf_auto=1
net.inet.tcp.recvbuf_auto=1
net.inet.tcp.sendbuf_inc=16384
net.inet.tcp.sack.enable=1
net.inet.tcp.blackhole=1
net.inet.tcp.msl=2000
net.inet.tcp.delayed_ack=1
net.inet.tcp.rfc1323=1
net.inet.udp.blackhole=1
net.inet.ip.redirect=0
net.inet.ip.forwarding=0
net.inet.ip.portrange.randomized=1
net.inet.ip.portrange.randomtime=0
net.inet6.ip6.auto_linklocal=1
net.inet6.ip6.accept_rtadv=2
net.inet6.icmp6.rediraccept=1
net.inet6.ip6.forwarding=0
net.inet.tcp.functions_default=freebsd
net.inet.tcp.hpts.skip_swi=1
net.inet.tcp.hpts.minsleep=250
net.inet.tcp.hpts.maxsleep=51200
